<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>CreativePortfolio — Головна</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet/less" href="css/style.less">
    <script src="https://cdn.jsdelivr.net/npm/less@4/dist/less.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2E75B6;">
<div class="container">
<a class="navbar-brand" href="index.html">
Creative<span class="text-warning">Portfolio</span>
</a>
<button id="themeToggle" class="btn btn-outline-light btn-sm ms-2" title="Змінити тему" type="button">/</button>
<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item">
<a class="nav-link" href="index.html">Головна</a>
</li>

<li class="nav-item">
<a class="nav-link" href="portfolio.html">Портфоліо</a>
</li>
<li class="nav-item">
<a class="nav-link active" href="blog.html">Блог</a>
</li>
<li class="nav-item">
<a class="nav-link" href="contact.html">Контакти</a>
</li>
</ul>
</div>
<form class="d-flex ms-auto" role="search">
    <input class="form-control form-control-sm me-2" type="search" id="siteSearch" placeholder=" Пошук по сайту...">
</form>
</div>
</nav>
<div class="container py-4 blog-section">
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="mb-4">📊 Навички <span class="badge bg-secondary">Progress</span></h5>
            
            <div class="skill-item mb-3">
                <div class="d-flex justify-content-between mb-1">
                    <strong>HTML5 / CSS3</strong>
                    <span>90%</span>
                </div>
                <div class="progress" style="height: 12px;">
                    <div class="progress-bar bg-primary" style="width: 90%"></div>
                </div>
            </div>

            <div class="skill-item mb-3">
                <div class="d-flex justify-content-between mb-1">
                    <strong>JavaScript</strong>
                    <span>75%</span>
                </div>
                <div class="progress" style="height: 12px;">
                    <div class="progress-bar bg-warning" style="width: 75%"></div>
                </div>
            </div>

            <div class="skill-item mb-3">
                <div class="d-flex justify-content-between mb-1">
                    <strong>Bootstrap</strong>
                    <span>85%</span>
                </div>
                <div class="progress" style="height: 12px;">
                    <div class="progress-bar bg-success" style="width: 85%"></div>
                </div>
            </div>

            <div class="skill-item">
                <div class="d-flex justify-content-between mb-1">
                    <strong>Git / GitHub</strong>
                    <span>70%</span>
                </div>
                <div class="progress" style="height: 12px;">
                    <div class="progress-bar bg-info" style="width: 70%"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-4">📄 Блог</h5>

            <div class="row">
                <div class="col-md-8" id="blogPosts">
                    <!-- Пости генеруються через JS -->
                </div>
                <div class="col-md-4">
                    <!-- Бічна панель -->
                    <div class="card mb-3">
                        <div class="card-header">Пошук</div>
                        <div class="card-body">
                            <input
                                type="text"
                                class="form-control"
                                id="blogSearch"
                                placeholder="Пошук по блогу...">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Панель кастомізації -->
    <div class="container mt-5 mb-5">
        <div class="card" id="customPanel">
            <div class="card-header bg-primary text-white">
                <strong>🎨 Кастомізація інтерфейсу</strong>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-4">
                        <label class="form-label">Основний колір (Hue)</label>
                        <input type="range" id="hueSlider" class="form-range" min="0" max="360" value="210">
                        <small class="text-muted" id="hueValue">Значення: 210°</small>
                    </div>
                    <div class="col-md-4 mb-4">
                        <label class="form-label">Розмір шрифту заголовків</label>
                        <input type="range" id="fontSlider" class="form-range" min="16" max="36" value="24">
                        <small class="text-muted" id="fontValue">Значення: 24px</small>
                    </div>
                    <div class="col-md-4 mb-4">
                        <label class="form-label">border-radius (округлення)</label>
                        <input type="range" id="radiusSlider" class="form-range" min="0" max="25" value="8">
                        <small class="text-muted" id="radiusValue">Значення: 8px</small>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" id="resetBtn">Скидання налаштувань</button>
            </div>
        </div>
    </div>
    <!-- CSS-завантажувач -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p>Завантаження...</p>
    </div>
    <!-- Кнопка "Прокрутити нагору" -->
    <button id="scrollTopBtn" class="scroll-top-btn" title="Прокрутити нагору"> ↑ </button>
    <!-- Bootstrap JS (в кінці body) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Кастомний JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/storage.js"></script>
    <!-- Динамічний блог -->
    <script src="js/blog.js"></script>
    <!-- Персоналізація інтерфейсу -->
    <script src="js/customization.js"></script>
    <!-- Drag and Drop для галереї -->
    <script src="js/drag-sort.js"></script>
    <!-- Scroll Reveal -->
    <script src="js/scroll-reveal.js"></script>
    <script src="js/smooth-scroll.js"></script>
    <script src="js/typing.js"></script>
</body>
</html>
